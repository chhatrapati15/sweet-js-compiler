<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Sweet JS Compiler</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
</head>

<body>

  <div class="app">

    <main class="workspace">

      <section class="editor-card">

        <div class="editor-header">
          <div class="brand">
            <div class="logo"></div>
            <h2>Sweet JS</h2>
          </div>

          <div class="editor-status">
            JavaScript Runtime
          </div>
        </div>

        <div id="editor"></div>

      </section>

      <section class="console-card">

        <div class="console-header">
          <h3>Console</h3>

          <span id="status">
            Idle
          </span>
        </div>

        <div id="output"></div>

      </section>

    </main>

    <div class="floating-actions">

      <button id="clear">
        Clear
      </button>

      <button id="theme">
        Theme
      </button>

      <label class="switch">
        <input
          type="checkbox"
          id="autorun"
        />
        <span>Auto</span>
      </label>

      <button
        id="run"
        class="run-btn"
      >
        ▶ Run
      </button>

    </div>

  </div>

  <iframe
    id="sandbox"
    hidden
    sandbox="allow-scripts"
  ></iframe>

  <script src="./app.js"></script>

</body>
</html>
